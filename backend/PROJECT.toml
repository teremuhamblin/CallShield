[project]
name = "callshield-backend"
version = "0.1.0"
description = "Backend API for CallShield"
requires-python = ">=3.11"
authors = [
    { name = "Teremu" }
]

dependencies = [
    "fastapi==0.110.0",
    "uvicorn==0.29.0",
    "pydantic==2.6.4",
    "python-dotenv==1.0.1",
    "requests==2.31.0",
    "pyyaml==6.0.1",
    "rich==13.7.0",
    "jsonschema==4.21.1",
    "passlib[bcrypt]==1.7.4",
    "cryptography==42.0.5"
]

[project.optional-dependencies]
dev = [
    "pytest==8.1.1",
    "pytest-cov==5.0.0",
    "httpx==0.27.0",
    "ruff==0.3.4",
    "mypy==1.9.0",
    "black==24.3.0",
    "mkdocs==1.5.3",
    "mkdocs-material==9.5.13",
    "pre-commit==3.7.0"
]

[tool.black]
line-length = 88

[tool.ruff]
line-length = 88

[tool.mypy]
strict = true
